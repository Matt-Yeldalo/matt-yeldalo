name: Update README cards
on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # - name: Generate stats card
      #   uses: readme-tools/github-readme-stats-action@v1
      #   with:
      #     card: stats
      #     options: username=${{ github.repository_owner }}&show_icons=true
      #     path: profile/stats.svg
      #     token: ${{ secrets.GH_PT }}
          
      - name: Generate top languages card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: top-langs
          options: username=${{ github.repository_owner }}theme=ondark&layout=compact&langs_count=6
          path: profile/stats.svg
          token: ${{ secrets.GH_PT }}

      - name: Commit cards
        env:
          GH_TOKEN: ${{ secrets.GH_PT }}
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@users.noreply.github.com"
          git add profile/*.svg
          git commit -m "Update README cards" || exit 0
          git push https://x-access-token:${GH_TOKEN}@github.com/Matt-Yeldalo/matt-yeldalo.git HEAD:${GITHUB_REF#refs/heads/}
